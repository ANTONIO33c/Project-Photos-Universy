<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <!-- Icons Social -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Khateu - Fotografia</title>
</head>

<body>

  <!-- BOTÃO MOBILE -->
  <button class="menu-toggle">☰</button>

  <!-- NAVBAR (carregada via JS) -->
  <div id="navbar-container"></div>

  <!-- CONTEÚDO -->
  <main class="carousel-area">

    <!-- CARROSSEL -->
    <div class="swiper">
      <div class="swiper-wrapper">

        <div class="swiper-slide">
          <img src="images/IMG_9956.CR2.jpg">
           <div class="slide-text">
            <h2>O começo de uma nova história</h2>
            <span>Um dia inesquecível</span>
          </div>
         </div>

        <div class="swiper-slide">
          <img src="images/IMG_0847.CR2.jpg">
           <div class="slide-text">
            <h2>A beleza de gerar a vida</h2>
            <span>À espera de um grande amor</span>
          </div>
        </div>
        
         <div class="swiper-slide">
          <img src="images/IMG_1769.CR2.jpg">
           <div class="slide-text">
            <h2>Ovo de Páscoa Artesanal</h2>
            <span>Edição Especial</span>
          </div>
        </div>

         <div class="swiper-slide">
          <img src="images/20240706141019_IMG_6736.JPG">
           <div class="slide-text">
              <h2>Sorrisos que iluminam o dia</h2>
            <span>Momentos de pura alegria</span>
          </div>
        </div>
        
        <div class="swiper-slide">
          <img src="images/IMG_9937.jpg">
           <div class="slide-text">
            <h2>Cada ponto, uma batalha</h2>
            <span>Campeonato em ação</span>
          </div>
        </div>
      </div>
    </div>

    <!-- GRID -->
    <section class="recent-works">
      <h2>Trabalhos recentes</h2>

      <div class="grid-gallery">
        <img src="images/IMG_0174.CR2.jpg">
        <img src="images/IMG_1984.JPG">
        <img src="images/IMG_1868.JPG">
        <img src="images/IMG_9228.JPG">
        <img src="images/IMG_9647.jpg">
        <img src="images/ld-export-122a223a-07172025.jpg">
         <img src="images/IMG_5834.jpg">
        <img src="images/IMG_3458.jpg">
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <!-- Script -->
  <script src="js/script.js"></script>

</body>
</html>
